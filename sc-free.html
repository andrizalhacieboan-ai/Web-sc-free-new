<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDRI STORE - Kumpulan script</title>
    
    <!-- Google Fonts: Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#87CEEB',
                        dark: '#0f172a',
                        darker: '#020617',
                        card: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['"Open Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(135, 206, 235, 0.2);
        }
        .script-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(135, 206, 235, 0.1);
        }
        .script-card:hover {
            transform: translateY(-5px);
            border-color: #87CEEB;
            box-shadow: 0 10px 20px -10px rgba(135, 206, 235, 0.3);
        }
        .input-tech {
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(135, 206, 235, 0.3);
            color: white;
            transition: border-color 0.3s;
        }
        .input-tech:focus {
            outline: none;
            border-color: #87CEEB;
            box-shadow: 0 0 0 2px rgba(135, 206, 235, 0.2);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617; 
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #87CEEB; 
        }
        
        /* Message Box */
        #msg-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            transform: translateX(150%);
            transition: transform 0.3s ease-out;
        }
        #msg-box.show {
            transform: translateX(0);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center cursor-pointer" onclick="navigate('home')">
                    <i class="fa-solid fa-robot text-primary text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-wider text-primary">ANDRI STORE</span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-6 items-center" id="nav-menu">
                    <!-- Populated by JS -->
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-300 hover:text-primary focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu Panel -->
        <div id="mobile-menu" class="hidden md:hidden bg-card border-b border-primary/20">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3" id="mobile-nav-menu">
                <!-- Populated by JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full pt-24 pb-12" id="app-container">
        <!-- Views will be injected here -->
        <div class="flex justify-center items-center h-64">
            <i class="fa-solid fa-circle-notch fa-spin text-primary text-4xl"></i>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-darker border-t border-primary/20 py-8 text-center text-sm text-gray-400 mt-auto">
        <p>&copy; 2025-2026 ANDRI STORE. Platform Distribusi Script WhatsApp Bot Untuk Developer Indonesia.</p>
    </footer>

    <!-- Floating Message Box -->
    <div id="msg-box" class="bg-card border-l-4 border-primary text-white p-4 rounded shadow-lg flex items-center">
        <i id="msg-icon" class="fa-solid fa-info-circle text-primary mr-3 text-xl"></i>
        <span id="msg-text">Pesan di sini</span>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration & Initialization
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Fallback for local testing if needed
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wabot-hub-app';

        // Global State
        let appState = {
            view: 'home',
            scripts: [],
            users: [],
            currentUser: null, 
            searchQuery: '',
            isReady: false
        };

        // DOM Elements
        const container = document.getElementById('app-container');
        const navMenu = document.getElementById('nav-menu');
        const mobileNavMenu = document.getElementById('mobile-nav-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        // Toggle Mobile Menu
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // Initialize Authentication
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showMessage("Gagal terhubung ke server", "error");
            }
        };

        // Listen for Auth State
        onAuthStateChanged(auth, (user) => {
            if (user && !appState.isReady) {
                appState.isReady = true;
                setupRealtimeListeners();
            }
        });

        // Setup Database Listeners
        function setupRealtimeListeners() {
            const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');

            // Listen to Scripts
            onSnapshot(scriptsRef, (snapshot) => {
                appState.scripts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Add dummy data if empty for demonstration
                if (appState.scripts.length === 0) {
                    addDummyData();
                } else {
                    render();
                }
            }, (error) => {
                console.error("Error fetching scripts:", error);
                showMessage("Gagal memuat data script", "error");
            });

            // Listen to Users 
            onSnapshot(usersRef, (snapshot) => {
                appState.users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Check if current session user still exists
                if (appState.currentUser) {
                    const exists = appState.users.find(u => u.username === appState.currentUser.username);
                    if (!exists) appState.currentUser = null;
                }
                render();
            }, (error) => {
                console.error("Error fetching users:", error);
            });
        }

        async function addDummyData() {
            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                const dummyId = "script_" + Date.now();
                await setDoc(doc(scriptsRef, dummyId), {
                    title: "SCRIPT BOT ANDRI STORE V1",
                    description: "Script dasar WhatsApp Bot Multi Device menggunakan library Baileys. Dilengkapi dengan fitur antilink, welcome message, dan menu dinamis.\n\nFile di dalam zip meliputi: index.js, package.json, dan folder lib dan sebagainya.",
                    image: "https://img2.pixhost.to/images/7322/716841492_andri.jpg",
                    download_link: "https://www.mediafire.com/file/o1yvgnssxjt75vm/ANDRI_STORE_ID_V1.5._YT.zip/file", // External link instead of raw code
                    author: "ANDRI",
                    downloads: 1,
                    views: 1,
                    created_at: new Date().toISOString()
                });
            } catch (e) {
                console.error("Dummy data fail:", e);
            }
        }

        // Generate UUID
        function generateId() {
            return 'id_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // --- Core App Functions ---

        window.navigate = (view, data = null) => {
            appState.view = view;
            if (data) appState.currentData = data;
            mobileMenu.classList.add('hidden'); // hide mobile menu on navigation
            render();
            window.scrollTo(0,0);
        };

        window.handleSearch = (e) => {
            appState.searchQuery = e.target.value.toLowerCase();
            renderHome(); 
        };

        window.loginAppUser = (e) => {
            e.preventDefault();
            const form = e.target;
            const username = form.username.value;
            const password = form.password.value;

            const user = appState.users.find(u => u.username === username && u.password === password);
            if (user) {
                appState.currentUser = user;
                showMessage(`Selamat datang user, ${user.username}!`, "success");
                navigate('home');
            } else {
                showMessage("Username atau password anda salah!", "error");
            }
        };

        window.registerAppUser = async (e) => {
            e.preventDefault();
            const form = e.target;
            const username = form.username.value;
            const email = form.email.value;
            const password = form.password.value;

            if (appState.users.find(u => u.username === username)) {
                showMessage("Username sudah digunakan!", "error");
                return;
            }

            try {
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const newUserId = generateId();
                const newUser = {
                    username,
                    email,
                    password, 
                    role: username.toLowerCase() === 'andri' ? 'andri' : 'user',
                    created_at: new Date().toISOString()
                };
                
                await setDoc(doc(usersRef, newUserId), newUser);
                appState.currentUser = newUser;
                showMessage("Registrasi berhasil!", "success");
                navigate('home');
            } catch (error) {
                console.error("Reg error:", error);
                showMessage("Gagal mendaftar", "error");
            }
        };

        window.logoutAppUser = () => {
            appState.currentUser = null;
            showMessage("Berhasil keluar.", "success");
            navigate('home');
        };

        window.uploadScript = async (e) => {
            e.preventDefault();
            if (!appState.currentUser) {
                showMessage("Silakan login untuk mengunggah.", "error");
                navigate('login');
                return;
            }

            const form = e.target;
            const title = form.title.value;
            const description = form.description.value;
            const image = form.image.value || "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"; // Fallback image
            const download_link = form.download_link.value;

            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                const scriptId = generateId();
                
                await setDoc(doc(scriptsRef, scriptId), {
                    title,
                    description,
                    image,
                    download_link, // Save external link
                    author: appState.currentUser.username,
                    downloads: 0,
                    views: 0,
                    created_at: new Date().toISOString()
                });

                showMessage("Script berhasil diunggah!", "success");
                navigate('home');
            } catch (error) {
                console.error("Upload error:", error);
                showMessage("Gagal mengunggah script.", "error");
            }
        };

        window.deleteScript = async (id) => {
            if (!confirm("Apakah Anda yakin ingin menghapus script ini?")) return;
            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                await deleteDoc(doc(scriptsRef, id));
                showMessage("Script berhasil dihapus.", "success");
            } catch (error) {
                console.error("Delete error:", error);
                showMessage("Gagal menghapus script.", "error");
            }
        };

        window.viewScriptDetails = async (id) => {
            const script = appState.scripts.find(s => s.id === id);
            if (!script) return;

            // Increment views
            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                await updateDoc(doc(scriptsRef, id), {
                    views: script.views + 1
                });
            } catch (e) { console.error("Update view error:", e); }

            navigate('details', script);
        };

        window.downloadScript = async (id) => {
            const script = appState.scripts.find(s => s.id === id);
            if (!script) return;

            // Increment downloads counter
            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                await updateDoc(doc(scriptsRef, id), {
                    downloads: script.downloads + 1
                });
            } catch (e) { console.error("Update download error:", e); }

            showMessage("Mengarahkan ke halaman unduhan...", "success");
            
            // Open external link (MediaFire, GDrive, etc.) in a new tab
            setTimeout(() => {
                window.open(script.download_link, '_blank');
                // Re-render to update the local counter visually
                render();
            }, 800);
        };

        // Utility: Format Date
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        // Utility: Show Message
        let msgTimeout;
        window.showMessage = (text, type = "info") => {
            const box = document.getElementById('msg-box');
            const icon = document.getElementById('msg-icon');
            const txt = document.getElementById('msg-text');
            
            txt.innerText = text;
            box.className = "bg-card border-l-4 p-4 rounded shadow-lg flex items-center fixed top-5 right-5 z-[100] transform translate-x-[150%] transition-transform duration-300";
            
            if (type === "success") {
                box.classList.add("border-green-500");
                icon.className = "fa-solid fa-check-circle text-green-500 mr-3 text-xl";
            } else if (type === "error") {
                box.classList.add("border-red-500");
                icon.className = "fa-solid fa-exclamation-circle text-red-500 mr-3 text-xl";
            } else {
                box.classList.add("border-primary");
                icon.className = "fa-solid fa-info-circle text-primary mr-3 text-xl";
            }

            // Trigger animation
            setTimeout(() => box.classList.remove("translate-x-[150%]"), 10);
            
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => {
                box.classList.add("translate-x-[150%]");
            }, 3000);
        };


        // --- Render Functions ---

        function renderNav() {
            const isLoggedIn = appState.currentUser !== null;
            const isAdmin = isLoggedIn && appState.currentUser.role === 'admin';

            let links = `
                <button onclick="navigate('home')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Beranda</button>
            `;

            if (isLoggedIn) {
                links += `<button onclick="navigate('upload')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Unggah Script</button>`;
                if (isAdmin) {
                    links += `<button onclick="navigate('admin')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Kelola Script</button>`;
                }
                links += `
                    <div class="flex items-center text-primary px-3 py-2 font-semibold">
                        <i class="fa-regular fa-user mr-2"></i> ${appState.currentUser.username}
                    </div>
                    <button onclick="logoutAppUser()" class="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-4 py-2 rounded transition-colors block mx-3 my-2 md:my-0 md:mx-0">Keluar/Out</button>
                `;
            } else {
                links += `
                    <button onclick="navigate('login')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Masuk</button>
                    <button onclick="navigate('register')" class="bg-primary text-slate-900 font-bold px-4 py-2 rounded hover:bg-sky-300 transition-colors block mx-3 my-2 md:my-0 md:mx-0">Daftar</button>
                `;
            }

            navMenu.innerHTML = links;
            mobileNavMenu.innerHTML = links;
        }

        function render() {
            if (!appState.isReady) return;
            renderNav();

            switch (appState.view) {
                case 'home':
                    renderHome();
                    break;
                case 'upload':
                    renderUpload();
                    break;
                case 'login':
                    renderLogin();
                    break;
                case 'register':
                    renderRegister();
                    break;
                case 'admin':
                    renderAdmin();
                    break;
                case 'details':
                    renderDetails();
                    break;
                default:
                    renderHome();
            }
        }

        function renderHome() {
            const filteredScripts = appState.scripts.filter(s => 
                s.title.toLowerCase().includes(appState.searchQuery) || 
                s.description.toLowerCase().includes(appState.searchQuery)
            ).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let html = `
                <!-- Hero / Search Section -->
                <div class="text-center py-16 mb-10 bg-card rounded-2xl shadow-lg border border-primary/20 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-transparent"></div>
                    <div class="relative z-10">
                        <h1 class="text-4xl md:text-5xl font-bold mb-4">Temukan <span class="text-primary">Script Bot WA</span> Terbaik</h1>
                        <p class="text-gray-400 mb-8 max-w-2xl mx-auto text-lg">Pusat repositori untuk mencari dan mengunduh source code WhatsApp Bot dalam format ZIP dengan mudah aman berkualitas gratis dan aman. Semua script telah diuji.</p>
                        <div class="max-w-xl mx-auto relative px-4 sm:px-0">
                            <i class="fa-solid fa-search absolute left-8 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" placeholder="Cari berdasarkan nama script bot" class="w-full input-tech rounded-full py-4 pl-14 pr-6 text-lg shadow-lg" value="${appState.searchQuery}" onkeyup="handleSearch(event)">
                        </div>
                    </div>
                </div>

                <!-- Scripts Grid -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold"><i class="fa-solid fa-folder-open text-primary mr-2"></i>Koleksi Script</h2>
                    <span class="text-sm bg-dark px-3 py-1 rounded-full text-primary border border-primary/30">${filteredScripts.length} Tersedia</span>
                </div>
                
                ${filteredScripts.length === 0 ? `
                    <div class="text-center py-16 text-gray-500 bg-card rounded-xl border border-gray-800 shadow-inner">
                        <i class="fa-solid fa-box-open text-6xl mb-4 text-gray-700"></i>
                        <p class="text-lg">Belum ada script yang cocok dengan pencarian Anda.</p>
                    </div>
                ` : `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${filteredScripts.map(script => `
                            <div class="script-card bg-card rounded-xl overflow-hidden shadow-lg flex flex-col relative">
                                <div class="absolute top-4 right-4 z-10 bg-darker/80 backdrop-blur px-2 py-1 rounded text-xs font-bold text-primary border border-primary/30">
                                    <i class="fa-solid fa-file-zipper mr-1"></i> ZIP
                                </div>
                                <div class="h-48 overflow-hidden relative group cursor-pointer" onclick="viewScriptDetails('${script.id}')">
                                    <img src="${script.image}" alt="${script.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                                    <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button class="bg-primary text-slate-900 font-bold px-5 py-2 rounded-full shadow-[0_0_15px_rgba(135,206,235,0.4)]"><i class="fa-solid fa-eye mr-2"></i>Detail & Download</button>
                                    </div>
                                </div>
                                <div class="p-6 flex-grow flex flex-col">
                                    <h3 class="text-xl font-bold mb-2 hover:text-primary cursor-pointer truncate" onclick="viewScriptDetails('${script.id}')">${script.title}</h3>
                                    <p class="text-gray-400 text-sm mb-5 line-clamp-2">${script.description}</p>
                                    <div class="mt-auto flex justify-between items-center text-xs font-medium text-gray-500 border-t border-gray-700 pt-4">
                                        <span class="flex items-center"><img src="https://ui-avatars.com/api/?name=${script.author}&background=0D8ABC&color=fff&size=20" class="rounded-full mr-2"> ${script.author}</span>
                                        <div class="space-x-3 bg-dark px-3 py-1 rounded-full">
                                            <span title="Dilihat"><i class="fa-solid fa-eye text-primary/70"></i> ${script.views || 0}</span>
                                            <span title="Diunduh"><i class="fa-solid fa-download text-green-400/70"></i> ${script.downloads || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `}
            `;
            container.innerHTML = html;
        }

        function renderUpload() {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-card p-8 md:p-10 rounded-2xl shadow-xl border border-primary/20">
                    <h2 class="text-3xl font-bold mb-2"><i class="fa-solid fa-cloud-arrow-up text-primary mr-3"></i>Bagikan Script Anda</h2>
                    <p class="text-gray-400 mb-8 border-b border-gray-700 pb-6"> tempelkan linknya di sini url.</p>
                    
                    <form onsubmit="uploadScript(event)" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Judul Script *</label>
                            <input type="text" name="title" required class="w-full input-tech rounded-lg py-3 px-4" placeholder="Misal: Script Bot Store MD V3.0">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Deskripsi Detail *</label>
                            <textarea name="description" required rows="4" class="w-full input-tech rounded-lg py-3 px-4" placeholder="Jelaskan fitur-fitur bot, cara install, dan library yang digunakan..."></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">Link Unduhan url MediaFire *</label>
                                <div class="relative">
                                    <i class="fa-solid fa-link absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="url" name="download_link" required class="w-full input-tech rounded-lg py-3 pl-12 pr-4" placeholder="https://mediafire.com/file/...">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">URL Gambar Cover (Opsional)</label>
                                <div class="relative">
                                    <i class="fa-solid fa-image absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="url" name="image" class="w-full input-tech rounded-lg py-3 pl-12 pr-4" placeholder="https://imgur.com/image.jpg">
                                </div>
                            </div>
                        </div>

                    <p class="text-center text-gray-400 mt-6 relative z-10">Belum punya akun? <a href="#" onclick="navigate('register'); return false;" class="text-primary font-semibold hover:underline">Daftar sekarang</a></p>
                </div>
            `;
        }

        function renderRegister() {
            container.innerHTML = `
                <div class="max-w-md mx-auto mt-12 bg-card p-8 rounded-2xl shadow-xl border border-primary/20 relative overflow-hidden">

        function renderAdmin() {
            if (!appState.currentUser || appState.currentUser.role !== 'andri') {

            }

            const scripts = appState.scripts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let html = `
                <div class="bg-card p-6 md:p-8 rounded-2xl shadow-xl border border-primary/20">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 pb-4 border-b border-gray-700">
                        <div>
                            <h2 class="text-3xl font-bold"><i class="fa-solid fa-shield-halved text-primary mr-3"></i>Khusus Admin</h2>
                            <p class="text-gray-400 mt-1">Kelola data repositori script</p>
                        </div>
                        <div class="mt-6 md:mt-0 flex gap-4 text-center w-full md:w-auto">
                            <div class="bg-dark flex-1 md:flex-none px-6 py-3 rounded-xl border border-gray-700">
                                <span class="block text-3xl font-bold text-primary">${appState.scripts.length}</span>
                                <span class="text-sm font-medium text-gray-400">Total Script</span>

                            <div class="bg-dark flex-1 md:flex-none px-6 py-3 rounded-xl border border-gray-700">

                            </div>
                        </div>
                    </div>

                                <tr>
                                    <th class="px-6 py-4 font-semibold">Script Info</th>
                                    <th class="px-6 py-4 font-semibold">Uploader</th>
                                    <th class="px-6 py-4 font-semibold">Statistik</th>
                                    <th class="px-6 py-4 font-semibold">Link Tautan</th>
                                    <th class="px-6 py-4 font-semibold text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800">

                                    <tr class="hover:bg-card transition-colors">
                                        <td class="px-6 py-4">
                                            <div class="font-bold text-white max-w-[250px] truncate" title="${script.title}">${script.title}</div>
                                            <div class="text-xs text-gray-500 mt-1">Dibuat: ${formatDate(script.created_at)}</div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span class="bg-card border border-gray-700 text-gray-300 px-3 py-1.5 rounded-full text-xs flex items-center w-max"><img src="https://ui-avatars.com/api/?name=${script.author}&background=0D8ABC&color=fff&size=16" class="rounded-full mr-2"> ${script.author}</span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="flex space-x-4 text-xs font-medium">
                                                <span class="text-gray-400 bg-gray-800 px-2 py-1 rounded"><i class="fa-solid fa-eye text-primary mr-1"></i> ${script.views || 0}</span>
                                                <span class="text-gray-400 bg-gray-800 px-2 py-1 rounded"><i class="fa-solid fa-download text-green-400 mr-1"></i> ${script.downloads || 0}</span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <a href="${script.download_link}" target="_blank" class="text-blue-400 hover:text-blue-300 flex items-center text-xs bg-blue-500/10 px-3 py-1.5 rounded-full w-max"><i class="fa-solid fa-external-link-alt mr-2"></i> Cek Link</a>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <button onclick="viewScriptDetails('${script.id}')" class="text-gray-400 hover:text-primary mr-3 p-2 rounded-lg hover:bg-gray-800 transition-colors" title="Lihat"><i class="fa-solid fa-eye"></i></button>
                                            <button onclick="deleteScript('${script.id}')" class="text-red-500 hover:text-red-400 p-2 rounded-lg hover:bg-red-500/10 transition-colors" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

                            <div class="flex flex-wrap items-center text-sm text-gray-400 mb-8 gap-4 border-b border-gray-700 pb-6">

                            <div class="text-gray-300 leading-relaxed mb-10 whitespace-pre-wrap bg-dark p-6 rounded-xl border border-gray-800 flex-grow">${script.description}</div>
                            
                            <div class="mt-auto">
                                <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-xl mb-6 flex items-start">
                                    <i class="fa-solid fa-shield-check text-blue-400 mt-1 mr-3 text-lg"></i>
                                    <div class="text-sm text-blue-200">

                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Start Auth process which triggers the app
        initAuth();

    </script>
