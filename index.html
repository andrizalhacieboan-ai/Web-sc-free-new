 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaBot Hub - Script Repository</title>
    
    <!-- Google Fonts: Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#87CEEB',
                        dark: '#0f172a',
                        darker: '#020617',
                        card: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['"Open Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(135, 206, 235, 0.2);
        }
        .script-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(135, 206, 235, 0.1);
        }
        .script-card:hover {
            transform: translateY(-5px);
            border-color: #87CEEB;
            box-shadow: 0 10px 20px -10px rgba(135, 206, 235, 0.3);
        }
        .input-tech {
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(135, 206, 235, 0.3);
            color: white;
            transition: border-color 0.3s;
        }
        .input-tech:focus {
            outline: none;
            border-color: #87CEEB;
            box-shadow: 0 0 0 2px rgba(135, 206, 235, 0.2);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617; 
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #87CEEB; 
        }
        
        /* Message Box */
        #msg-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            transform: translateX(150%);
            transition: transform 0.3s ease-out;
        }
        #msg-box.show {
            transform: translateX(0);
        }

        /* Social Icons */
        .social-btn {
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center cursor-pointer" onclick="navigate('home')">
                    <i class="fa-solid fa-robot text-primary text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-wider text-primary">WaBot Hub</span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-6 items-center" id="nav-menu">
                    <!-- Populated by JS -->
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-300 hover:text-primary focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu Panel -->
        <div id="mobile-menu" class="hidden md:hidden bg-card border-b border-primary/20">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3" id="mobile-nav-menu">
                <!-- Populated by JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full pt-24 pb-12" id="app-container">
        <!-- Views will be injected here -->
        <div class="flex justify-center items-center h-64">
            <i class="fa-solid fa-circle-notch fa-spin text-primary text-4xl"></i>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-darker border-t border-primary/20 py-10 mt-auto relative overflow-hidden">
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="text-center md:text-left mb-6 md:mb-0">
                    <h3 class="text-xl font-bold text-white mb-2"><i class="fa-solid fa-robot text-primary mr-2"></i>WaBot Hub</h3>
                    <p class="text-sm text-gray-400">Platform Distribusi Script WhatsApp Bot Terbaik.</p>
                    <p class="text-xs text-gray-500 mt-2">&copy; 2026 WaBot Hub. Hak Cipta Dilindungi.</p>
                </div>
                
                <div class="text-center md:text-right">
                    <p class="text-sm font-semibold text-gray-300 mb-4">Hubungi Developer Kami:</p>
                    <div class="flex justify-center md:justify-end space-x-4">
                        <!-- WhatsApp Link (Target to App) -->
                        <a href="https://wa.me/6281234567890?text=Halo%20Admin%20WaBot%20Hub," target="_blank" rel="noopener noreferrer" class="social-btn bg-[#25D366]/20 text-[#25D366] hover:bg-[#25D366] hover:text-white w-10 h-10 rounded-full flex items-center justify-center border border-[#25D366]/30 shadow-lg" title="WhatsApp Developer">
                            <i class="fa-brands fa-whatsapp text-xl"></i>
                        </a>
                        <!-- Telegram Link (Target to App) -->
                        <a href="https://t.me/username_telegram_anda" target="_blank" rel="noopener noreferrer" class="social-btn bg-[#0088cc]/20 text-[#0088cc] hover:bg-[#0088cc] hover:text-white w-10 h-10 rounded-full flex items-center justify-center border border-[#0088cc]/30 shadow-lg" title="Telegram Developer">
                            <i class="fa-brands fa-telegram text-xl"></i>
                        </a>
                        <!-- Email Link (Target to Mail Client) -->
                        <a href="mailto:developer@wabothub.com?subject=Pertanyaan%20Seputar%20WaBot%20Hub" class="social-btn bg-primary/20 text-primary hover:bg-primary hover:text-slate-900 w-10 h-10 rounded-full flex items-center justify-center border border-primary/30 shadow-lg" title="Email Developer">
                            <i class="fa-solid fa-envelope text-lg"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Floating Message Box -->
    <div id="msg-box" class="bg-card border-l-4 border-primary text-white p-4 rounded shadow-lg flex items-center">
        <i id="msg-icon" class="fa-solid fa-info-circle text-primary mr-3 text-xl"></i>
        <span id="msg-text">Pesan di sini</span>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyA6vwKHbFFtNAcsHxXc3LV5JJtwYqCA7Kk",
            authDomain: "sc-free-bot.firebaseapp.com",
            projectId: "sc-free-bot",
            storageBucket: "sc-free-bot.firebasestorage.app",
            messagingSenderId: "846877969110",
            appId: "1:846877969110:web:c095a0e0c89ccd2818d777",
            measurementId: "G-7VJK5V9G2V"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'wabot-hub-app';

        // Global State
        let appState = {
            view: 'home',
            scripts: [],
            users: [],
            currentUser: null, 
            searchQuery: '',
            isReady: false
        };

        const container = document.getElementById('app-container');
        const navMenu = document.getElementById('nav-menu');
        const mobileNavMenu = document.getElementById('mobile-nav-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showMessage("Gagal terhubung ke server", "error");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && !appState.isReady) {
                appState.isReady = true;
                setupRealtimeListeners();
            }
        });

        function setupRealtimeListeners() {
            const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');

            onSnapshot(scriptsRef, (snapshot) => {
                appState.scripts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            }, (error) => {
                console.error("Error fetching scripts:", error);
            });

            onSnapshot(usersRef, (snapshot) => {
                appState.users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                if (appState.currentUser) {
                    const exists = appState.users.find(u => u.username === appState.currentUser.username);
                    if (!exists) appState.currentUser = null;
                }
                render();
            }, (error) => {
                console.error("Error fetching users:", error);
            });
        }

        function generateId() {
            return 'id_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        window.navigate = (view, data = null) => {
            appState.view = view;
            if (data) appState.currentData = data;
            mobileMenu.classList.add('hidden'); 
            render();
            window.scrollTo(0,0);
        };

        window.handleSearch = (e) => {
            appState.searchQuery = e.target.value.toLowerCase();
            renderHome(); 
        };

        window.loginAppUser = (e) => {
            e.preventDefault();
            const form = e.target;
            const username = form.username.value;
            const password = form.password.value;

            const user = appState.users.find(u => u.username === username && u.password === password);
            if (user) {
                appState.currentUser = user;
                showMessage(`Selamat datang, ${user.username}!`, "success");
                navigate('home');
            } else {
                showMessage("Username atau password salah!", "error");
            }
        };

        window.registerAppUser = async (e) => {
            e.preventDefault();
            const form = e.target;
            const username = form.username.value;
            const email = form.email.value;
            const password = form.password.value;

            if (appState.users.find(u => u.username === username)) {
                showMessage("Username sudah digunakan!", "error");
                return;
            }

            try {
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const newUserId = generateId();
                const newUser = {
                    username,
                    email,
                    password, 
                    role: username.toLowerCase() === 'admin' ? 'admin' : 'user',
                    created_at: new Date().toISOString()
                };
                
                await setDoc(doc(usersRef, newUserId), newUser);
                appState.currentUser = newUser;
                showMessage("Registrasi berhasil!", "success");
                navigate('home');
            } catch (error) {
                console.error("Reg error:", error);
                showMessage("Gagal mendaftar. Pastikan Rules Firestore mengizinkan write.", "error");
            }
        };

        window.logoutAppUser = () => {
            appState.currentUser = null;
            showMessage("Berhasil keluar.", "success");
            navigate('home');
        };

        window.uploadScript = async (e) => {
            e.preventDefault();
            if (!appState.currentUser) {
                showMessage("Silakan login untuk mengunggah.", "error");
                navigate('login');
                return;
            }

            const form = e.target;
            const title = form.title.value;
            const description = form.description.value;
            const image = form.image.value || "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"; 
            let download_link = form.download_link.value;
            
            // Perbaiki link jika tidak mengandung protokol http
            if (!download_link.startsWith('http://') && !download_link.startsWith('https://')) {
                download_link = 'https://' + download_link;
            }

            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                const scriptId = generateId();
                
                await setDoc(doc(scriptsRef, scriptId), {
                    title,
                    description,
                    image,
                    download_link, 
                    author: appState.currentUser.username,
                    downloads: 0,
                    views: 0,
                    created_at: new Date().toISOString()
                });

                showMessage("Script berhasil diunggah!", "success");
                navigate('home');
            } catch (error) {
                console.error("Upload error:", error);
                showMessage("Gagal mengunggah script.", "error");
            }
        };

        window.deleteScript = async (id) => {
            if (!confirm("Apakah Anda yakin ingin menghapus script ini?")) return;
            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                await deleteDoc(doc(scriptsRef, id));
                showMessage("Script berhasil dihapus.", "success");
            } catch (error) {
                console.error("Delete error:", error);
                showMessage("Gagal menghapus script.", "error");
            }
        };

        window.viewScriptDetails = async (id) => {
            if (!appState.currentUser) {
                showMessage("Akses Ditolak! Anda harus Login atau Daftar untuk melihat detail & mengunduh.", "error");
                setTimeout(() => {
                    navigate('login');
                }, 2000);
                return;
            }

            const script = appState.scripts.find(s => s.id === id);
            if (!script) return;

            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                await updateDoc(doc(scriptsRef, id), {
                    views: script.views + 1
                });
            } catch (e) { console.error("Update view error:", e); }

            navigate('details', script);
        };

        // --- UPDATE PENTING: FIX MASALAH DOWNLOAD TAB PIHAK KETIGA ---
        window.downloadScript = async (id) => {
            if (!appState.currentUser) {
                showMessage("Sesi Anda telah habis. Silakan login kembali.", "error");
                navigate('login');
                return;
            }

            const script = appState.scripts.find(s => s.id === id);
            if (!script) return;
            
            const linkDownload = script.download_link;
            if(!linkDownload){
                showMessage("Link unduhan tidak valid atau kosong.", "error");
                return;
            }

            showMessage("Mengarahkan ke halaman unduhan...", "success");
            
            // EKSEKUSI SINKRON: Buat tag <a> virtual dan klik secara otomatis untuk memintas popup blocker
            try {
                const a = document.createElement('a');
                a.href = linkDownload;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch(e) {
                // Fallback jika pembuatan dom dilarang (meskipun jarang terjadi)
                window.open(linkDownload, '_blank');
            }

            // PROSES DATABASE: Update angka counter download di background
            try {
                const scriptsRef = collection(db, 'artifacts', appId, 'public', 'data', 'scripts');
                await updateDoc(doc(scriptsRef, id), {
                    downloads: (script.downloads || 0) + 1
                });
                
                // Update tampilan angka di layar tanpa perlu refresh full
                script.downloads = (script.downloads || 0) + 1;
                render();
            } catch (e) { 
                console.error("Update download error:", e); 
            }
        };

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        let msgTimeout;
        window.showMessage = (text, type = "info") => {
            const box = document.getElementById('msg-box');
            const icon = document.getElementById('msg-icon');
            const txt = document.getElementById('msg-text');
            
            txt.innerText = text;
            box.className = "bg-card border-l-4 p-4 rounded shadow-lg flex items-center fixed top-5 right-5 z-[100] transform translate-x-[150%] transition-transform duration-300";
            
            if (type === "success") {
                box.classList.add("border-green-500");
                icon.className = "fa-solid fa-check-circle text-green-500 mr-3 text-xl";
            } else if (type === "error") {
                box.classList.add("border-red-500");
                icon.className = "fa-solid fa-exclamation-circle text-red-500 mr-3 text-xl";
            } else {
                box.classList.add("border-primary");
                icon.className = "fa-solid fa-info-circle text-primary mr-3 text-xl";
            }

            setTimeout(() => box.classList.remove("translate-x-[150%]"), 10);
            
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => {
                box.classList.add("translate-x-[150%]");
            }, 3000);
        };

        // --- Render Functions ---

        function renderNav() {
            const isLoggedIn = appState.currentUser !== null;
            const isAdmin = isLoggedIn && appState.currentUser.role === 'admin';

            let links = `
                <button onclick="navigate('home')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Beranda</button>
            `;

            if (isLoggedIn) {
                links += `<button onclick="navigate('upload')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Unggah Script</button>`;
                if (isAdmin) {
                    links += `<button onclick="navigate('admin')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Kelola (Admin)</button>`;
                }
                links += `
                    <div class="flex items-center text-primary px-3 py-2 font-semibold">
                        <i class="fa-regular fa-user mr-2"></i> ${appState.currentUser.username}
                    </div>
                    <button onclick="logoutAppUser()" class="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-4 py-2 rounded transition-colors block mx-3 my-2 md:my-0 md:mx-0">Keluar</button>
                `;
            } else {
                links += `
                    <button onclick="navigate('login')" class="text-gray-300 hover:text-primary transition-colors block px-3 py-2">Masuk</button>
                    <button onclick="navigate('register')" class="bg-primary text-slate-900 font-bold px-4 py-2 rounded hover:bg-sky-300 transition-colors block mx-3 my-2 md:my-0 md:mx-0">Daftar</button>
                `;
            }

            navMenu.innerHTML = links;
            mobileNavMenu.innerHTML = links;
        }

        function render() {
            if (!appState.isReady) return;
            renderNav();

            switch (appState.view) {
                case 'home': renderHome(); break;
                case 'upload': renderUpload(); break;
                case 'login': renderLogin(); break;
                case 'register': renderRegister(); break;
                case 'admin': renderAdmin(); break;
                case 'details': renderDetails(); break;
                default: renderHome();
            }
        }

        function renderHome() {
            const filteredScripts = appState.scripts.filter(s => 
                s.title.toLowerCase().includes(appState.searchQuery) || 
                s.description.toLowerCase().includes(appState.searchQuery)
            ).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let html = `
                <div class="text-center py-16 mb-10 bg-card rounded-2xl shadow-lg border border-primary/20 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-transparent"></div>
                    <div class="relative z-10">
                        <h1 class="text-4xl md:text-5xl font-bold mb-4">Temukan <span class="text-primary">Script Bot WA</span> Terbaik</h1>
                        <p class="text-gray-400 mb-8 max-w-2xl mx-auto text-lg">Pusat repositori untuk mencari, mengunggah, dan mengunduh source code WhatsApp Bot dalam format ZIP dengan mudah dan aman.</p>
                        <div class="max-w-xl mx-auto relative px-4 sm:px-0">
                            <i class="fa-solid fa-search absolute left-8 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" placeholder="Cari berdasarkan nama atau deskripsi..." class="w-full input-tech rounded-full py-4 pl-14 pr-6 text-lg shadow-lg" value="${appState.searchQuery}" onkeyup="handleSearch(event)">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold"><i class="fa-solid fa-folder-open text-primary mr-2"></i>Koleksi Script</h2>
                    <span class="text-sm bg-dark px-3 py-1 rounded-full text-primary border border-primary/30">${filteredScripts.length} Tersedia</span>
                </div>
                
                ${filteredScripts.length === 0 ? `
                    <div class="text-center py-16 text-gray-500 bg-card rounded-xl border border-gray-800 shadow-inner">
                        <i class="fa-solid fa-box-open text-6xl mb-4 text-gray-700"></i>
                        <p class="text-lg">Belum ada script yang diunggah ke database Anda.</p>
                    </div>
                ` : `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${filteredScripts.map(script => `
                            <div class="script-card bg-card rounded-xl overflow-hidden shadow-lg flex flex-col relative">
                                <div class="absolute top-4 right-4 z-10 bg-darker/80 backdrop-blur px-2 py-1 rounded text-xs font-bold text-primary border border-primary/30">
                                    <i class="fa-solid fa-file-zipper mr-1"></i> ZIP
                                </div>
                                <div class="h-48 overflow-hidden relative group cursor-pointer" onclick="viewScriptDetails('${script.id}')">
                                    <img src="${script.image}" alt="${script.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                                    
                                    <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                                        ${appState.currentUser 
                                            ? `<button class="bg-primary text-slate-900 font-bold px-5 py-2 rounded-full shadow-[0_0_15px_rgba(135,206,235,0.4)]"><i class="fa-solid fa-eye mr-2"></i>Detail & Download</button>`
                                            : `<div class="text-center px-4"><i class="fa-solid fa-lock text-3xl text-red-400 mb-2"></i><p class="text-white font-bold text-sm">Login untuk melihat</p></div>`
                                        }
                                    </div>
                                </div>
                                <div class="p-6 flex-grow flex flex-col">
                                    <h3 class="text-xl font-bold mb-2 hover:text-primary cursor-pointer truncate" onclick="viewScriptDetails('${script.id}')">
                                        ${!appState.currentUser ? '<i class="fa-solid fa-lock text-gray-500 text-sm mr-1"></i> ' : ''}${script.title}
                                    </h3>
                                    
                                    ${!appState.currentUser ? `
                                        <div class="relative">

        function renderLogin() {
            container.innerHTML = `

                        <button type="submit" class="w-full bg-primary text-slate-900 font-bold px-6 py-3.5 rounded-lg hover:bg-sky-300 transition-colors shadow-lg mt-4">Masuk ke Dashboard</button>

                    <p class="text-center text-gray-400 mt-6 relative z-10">Belum punya akun? <a href="#" onclick="navigate('register'); return false;" class="text-primary font-semibold hover:underline">Daftar sekarang</a></p>

                navigate('home');
                return;
            }

            const scripts = appState.scripts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let html = `
                <div class="bg-card p-6 md:p-8 rounded-2xl shadow-xl border border-primary/20">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 pb-4 border-b border-gray-700">

                            <h2 class="text-3xl font-bold"><i class="fa-solid fa-shield-halved text-primary mr-3"></i>Panel Admin</h2>
                        </div>
                        <div class="mt-6 md:mt-0 flex gap-4 text-center w-full md:w-auto">
                            <div class="bg-dark flex-1 md:flex-none px-6 py-3 rounded-xl border border-gray-700">
                                <span class="block text-3xl font-bold text-primary">${appState.scripts.length}</span>
                                <span class="text-sm font-medium text-gray-400">Total Script</span>
                            </div>
                            <div class="bg-dark flex-1 md:flex-none px-6 py-3 rounded-xl border border-gray-700">

                                    <th class="px-6 py-4 font-semibold">Uploader</th>
                                    <th class="px-6 py-4 font-semibold">Statistik</th>
                                    <th class="px-6 py-4 font-semibold text-right">Aksi</th>
                                </tr>
                            </thead>

                                            <div class="text-xs text-gray-500 mt-1">${formatDate(script.created_at)}</div>
                                        </td>
                                        <td class="px-6 py-4">${script.author}</td>
                                        <td class="px-6 py-4">View: ${script.views || 0} | DL: ${script.downloads || 0}</td>
                                        <td class="px-6 py-4 text-right">
                                            <button onclick="deleteScript('${script.id}')" class="text-red-500 hover:text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

            container.innerHTML = `
